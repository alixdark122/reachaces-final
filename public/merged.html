<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot War + Ace Race</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(ellipse 80% 50% at 20% 40%, rgba(25,198,253,0.15), transparent), radial-gradient(ellipse 60% 80% at 80% 60%, rgba(6,93,230,0.1), transparent), #0a0c12; min-height: 100vh; padding: 24px; color: #e2e8f0; }
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background: rgba(15,23,42,0.8); border: 1px solid rgba(25,198,253,0.3); border-radius: 60px; padding: 10px 28px; font-weight: bold; cursor: pointer; transition: all 0.2s; color: #94a3b8; }
        .tab-btn.active { background: linear-gradient(135deg, #19C6FD, #3b82f6); color: white; border-color: transparent; box-shadow: 0 0 15px rgba(25,198,253,0.4); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        iframe { width: 100%; min-height: 940px; border: none; border-radius: 28px; background: rgba(10,14,23,0.6); backdrop-filter: blur(12px); margin-bottom: 20px; }
        .shared-panel { background: rgba(15,23,42,0.5); border-radius: 28px; padding: 16px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
        .kick-info { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .kick-info button { background: linear-gradient(135deg, #19C6FD, #3b82f6); border: none; padding: 8px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; }
        .kick-info input { background: #0f172a; border: 1px solid rgba(25,198,253,0.3); padding: 8px 14px; border-radius: 60px; color: white; }
        .status { font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 60px; }
        /* Asset container at the bottom of each tab */
        .asset-container {
            margin-top: 10px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(25,198,253,0.2);
        }
        .asset-container img {
            max-width: 80%;
            border-radius: 10px;
            max-height: 50px;
        }
    </style>
</head>
<body>
<div class="tabs">
    <button class="tab-btn active" data-tab="slotwar">🎰 Slot War</button>
    <button class="tab-btn" data-tab="acerace">⚡ Ace Race</button>
</div>

<div class="shared-panel">
    <div class="kick-info">
        <button id="loginBtn">Login with Kick</button>
        <input type="text" id="channelInput" placeholder="Channel name">
        <button id="connectBtn">Connect</button>
        <span id="statusDisplay" class="status">⚪ Not logged in</span>
    </div>
    <div id="userInfo"></div>
</div>

<div id="slotwar-content" class="tab-content active">
    <iframe src="/slot-war.html" id="slotwarFrame"></iframe>
    <!-- Asset container for Slot War -->
    <div class="asset-container">
        <img src="/assets/reachacesText.png" alt="ReachAces Text Logo">
    </div>
</div>
<div id="acerace-content" class="tab-content">
    <iframe src="/game.html" id="aceraceFrame"></iframe>
    <!-- Asset container for Ace Race -->
    <div class="asset-container">
        <img src="/assets/reachacesText.png" alt="ReachAces Text Logo">
    </div>
</div>

<script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.getElementById('slotwar-content').classList.toggle('active', tab === 'slotwar');
            document.getElementById('acerace-content').classList.toggle('active', tab === 'acerace');
        });
    });

    let kickToken = null;
    let currentChannel = null;

    function sendTokenToIframes() {
        const msg = { type: 'KICK_TOKEN', token: kickToken, channel: currentChannel };
        const swFrame = document.getElementById('slotwarFrame');
        const arFrame = document.getElementById('aceraceFrame');
        if (swFrame && swFrame.contentWindow) swFrame.contentWindow.postMessage(msg, '*');
        if (arFrame && arFrame.contentWindow) arFrame.contentWindow.postMessage(msg, '*');
        console.log('Token sent to iframes', { channel: currentChannel });
    }

    window.addEventListener('message', (event) => {
        if (event.data.type === 'KICK_TOKEN') {
            kickToken = event.data.token;
            currentChannel = event.data.channel;
            if (currentChannel) {
                document.getElementById('channelInput').value = currentChannel;
                document.getElementById('statusDisplay').innerHTML = `🟢 Logged in as ${currentChannel}`;
                document.getElementById('loginBtn').textContent = 'Disconnect';
                document.getElementById('userInfo').innerHTML = `<div>Logged in as <strong>${currentChannel}</strong></div>`;
                sendTokenToIframes();
                localStorage.setItem('kickToken', kickToken);
                localStorage.setItem('currentChannel', currentChannel);
            } else {
                document.getElementById('statusDisplay').innerHTML = `🟢 Logged in to Kick`;
                document.getElementById('loginBtn').textContent = 'Disconnect';
                sendTokenToIframes();
            }
        }
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        if (kickToken) {
            kickToken = null;
            currentChannel = null;
            document.getElementById('statusDisplay').innerHTML = '⚪ Not logged in';
            document.getElementById('loginBtn').textContent = 'Login with Kick';
            document.getElementById('userInfo').innerHTML = '';
            localStorage.removeItem('kickToken');
            localStorage.removeItem('currentChannel');
            sendTokenToIframes();
        } else {
            window.open('/auth/kick', 'KickLogin', 'width=600,height=700');
        }
    });

    document.getElementById('connectBtn').addEventListener('click', () => {
        if (!kickToken) { alert('Please login first'); return; }
        const channel = document.getElementById('channelInput').value.trim();
        if (!channel) { alert('Enter a channel name'); return; }
        currentChannel = channel;
        localStorage.setItem('currentChannel', currentChannel);
        document.getElementById('statusDisplay').innerHTML = `🟢 Connecting to ${channel}...`;
        sendTokenToIframes();
        document.getElementById('statusDisplay').innerHTML = `🟢 Connected to ${channel}`;
    });

    const savedToken = localStorage.getItem('kickToken');
    const savedChannel = localStorage.getItem('currentChannel');
    if (savedToken) {
        kickToken = savedToken;
        currentChannel = savedChannel;
        if (currentChannel) {
            document.getElementById('channelInput').value = currentChannel;
            document.getElementById('statusDisplay').innerHTML = `🟢 Logged in as ${currentChannel}`;
            document.getElementById('loginBtn').textContent = 'Disconnect';
            document.getElementById('userInfo').innerHTML = `<div>Logged in as <strong>${currentChannel}</strong></div>`;
        } else {
            document.getElementById('statusDisplay').innerHTML = `🟢 Logged in to Kick`;
            document.getElementById('loginBtn').textContent = 'Disconnect';
        }
        let attempts = 0;
        function sendOnce() {
            attempts++;
            const swFrame = document.getElementById('slotwarFrame');
            const arFrame = document.getElementById('aceraceFrame');
            if (swFrame && swFrame.contentWindow && arFrame && arFrame.contentWindow) {
                sendTokenToIframes();
            } else if (attempts < 20) {
                setTimeout(sendOnce, 200);
            } else {
                console.warn('Iframes not ready after 4 seconds, sending anyway');
                sendTokenToIframes();
            }
        }
        sendOnce();
    }
</script>
</body>
</html>
